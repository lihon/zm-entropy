  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
  // в”Җв”Җ emoji зҹӯз Ғжҳ е°„ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const EMOJI = {
    // иЎЁжғ…
    'smile':'рҹҳ„','smiley':'рҹҳғ','grin':'рҹҳҒ','grinning':'рҹҳҖ','laughing':'рҹҳҶ','satisfied':'рҹҳҶ',
    'joy':'рҹҳӮ','rofl':'рҹӨЈ','wink':'рҹҳү','blush':'рҹҳҠ','innocent':'рҹҳҮ','heart_eyes':'рҹҳҚ',
    'kissing_heart':'рҹҳҳ','yum':'рҹҳӢ','stuck_out_tongue':'рҹҳӣ','stuck_out_tongue_wink':'рҹҳң',
    'stuck_out_tongue_closed_eyes':'рҹҳқ','relaxed':'вҳәпёҸ','slight_smile':'рҹҷӮ','hugging':'рҹӨ—',
    'thinking':'рҹӨ”','neutral_face':'рҹҳҗ','expressionless':'рҹҳ‘','unamused':'рҹҳ’','rolling_eyes':'рҹҷ„',
    'smirk':'рҹҳҸ','relieved':'рҹҳҢ','pensive':'рҹҳ”','worried':'рҹҳҹ','confused':'рҹҳ•',
    'disappointed':'рҹҳһ','cry':'рҹҳў','sob':'рҹҳӯ','angry':'рҹҳ ','rage':'рҹҳЎ',
    'triumph':'рҹҳӨ','tired_face':'рҹҳ«','fearful':'рҹҳЁ','scream':'рҹҳұ','cold_sweat':'рҹҳ°',
    'astonished':'рҹҳІ','sleeping':'рҹҳҙ','zipper_mouth':'рҹӨҗ','nerd':'рҹӨ“','sunglasses':'рҹҳҺ',
    'partying_face':'рҹҘі','pleading_face':'рҹҘә','facepalm':'рҹӨҰ','shrug':'рҹӨ·',
    // жүӢеҠҝ
    '+1':'рҹ‘Қ','thumbsup':'рҹ‘Қ','-1':'рҹ‘Һ','thumbsdown':'рҹ‘Һ','clap':'рҹ‘Ҹ','raised_hands':'рҹҷҢ',
    'pray':'рҹҷҸ','handshake':'рҹӨқ','ok_hand':'рҹ‘Ң','point_up':'вҳқпёҸ','point_down':'рҹ‘Ү',
    'point_right':'рҹ‘ү','point_left':'рҹ‘Ҳ','wave':'рҹ‘Ӣ','muscle':'рҹ’Ә','v':'вңҢпёҸ',
    'metal':'рҹӨҳ','call_me':'рҹӨҷ','fingers_crossed':'рҹӨһ','heart_hands':'рҹ«¶','pinched_fingers':'рҹӨҢ',
    // зҲұеҝғ
    'heart':'вқӨпёҸ','blue_heart':'рҹ’ҷ','purple_heart':'рҹ’ң','green_heart':'рҹ’ҡ','yellow_heart':'рҹ’ӣ',
    'orange_heart':'рҹ§Ў','black_heart':'рҹ–Ө','white_heart':'рҹӨҚ','broken_heart':'рҹ’”',
    'sparkling_heart':'рҹ’–','two_hearts':'рҹ’•','gift_heart':'рҹ’қ',
    // з¬ҰеҸ·
    'star':'вӯҗ','star2':'рҹҢҹ','sparkles':'вңЁ','zap':'вҡЎ','fire':'рҹ”Ҙ','boom':'рҹ’Ҙ',
    '100':'рҹ’Ҝ','bulb':'рҹ’Ў','rocket':'рҹҡҖ','tada':'рҹҺү','white_check_mark':'вң…','x':'вқҢ',
    'warning':'вҡ пёҸ','question':'вқ“','exclamation':'вқ—','recycle':'вҷ»пёҸ','eyes':'рҹ‘Җ',
    'speech_balloon':'рҹ’¬','thought_balloon':'рҹ’ӯ','hourglass':'вҢӣ','pin':'рҹ“Ң','paperclip':'рҹ“Һ',
    'lock':'рҹ”’','unlock':'рҹ”“','key':'рҹ”‘','mag':'рҹ”Қ','link':'рҹ”—','scissors':'вңӮпёҸ',
    // йҘ®йЈҹ
    'coffee':'вҳ•','tea':'рҹҚө','beer':'рҹҚә','wine_glass':'рҹҚ·','cocktail':'рҹҚё','bubble_tea':'рҹ§Ӣ',
    'pizza':'рҹҚ•','hamburger':'рҹҚ”','cake':'рҹҺӮ','apple':'рҹҚҺ','watermelon':'рҹҚү','banana':'рҹҚҢ',
    'taco':'рҹҢ®','sushi':'рҹҚЈ','bento':'рҹҚұ','rice':'рҹҚҡ','ramen':'рҹҚң','icecream':'рҹҚҰ',
    'popcorn':'рҹҚҝ','cookie':'рҹҚӘ',
    // еӨ©ж°”
    'sunny':'вҳҖпёҸ','cloud':'вҳҒпёҸ','umbrella':'вҳ”','snowflake':'вқ„пёҸ','rainbow':'рҹҢҲ','ocean':'рҹҢҠ',
    'moon':'рҹҢҷ','crescent_moon':'рҹҢҷ',
    // зү©д»¶
    'books':'рҹ“ҡ','book':'рҹ“–','memo':'рҹ“қ','pencil':'рҹ“қ','computer':'рҹ’»','keyboard':'вҢЁпёҸ',
    'package':'рҹ“Ұ','wrench':'рҹ”§','camera':'рҹ“·','headphones':'рҹҺ§','alarm_clock':'вҸ°',
    'calendar':'рҹ“…','check':'вң”пёҸ','email':'рҹ“§','phone':'рҹ“ұ',
  };

  // в”Җв”Җ marked emoji жү©еұ• в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const emojiExt = {
    name: 'emoji',
    level: 'inline',
    start(src) { return src.indexOf(':'); },
    tokenizer(src) {
      const m = src.match(/^:(\w+):/);
      if (m && EMOJI[m[1]]) return { type: 'emoji', raw: m[0], text: EMOJI[m[1]] };
    },
    renderer(token) { return token.text; },
  };
  marked.use({ extensions: [emojiExt] });

  // в”Җв”Җ ж–Үз« еҠ иҪҪ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  (async () => {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('p');
    if (!slug) {
      document.getElementById('post-content').innerHTML = '<p>жңӘжүҫеҲ°ж–Үз« гҖӮ</p>';
      return;
    }

    try {
      const res = await fetch(`posts/${slug}.md`);
      if (!res.ok) throw new Error('ж–Үз« дёҚеӯҳеңЁ');
      const raw = await res.text();

      // и§Јжһҗ frontmatter
      const match = raw.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
      let meta = {}, body = raw;
      if (match) {
        match[1].split('\n').forEach(line => {
          const kv = line.match(/^(\w+):\s*(.*)$/);
          if (kv) meta[kv[1]] = kv[2].trim();
        });
        body = match[2];
      }

      // жӣҙж–°ж Үйўҳ
      if (meta.title) {
        document.title = `${meta.title} вҖ” ZMзҶөеўһ`;
      }

      // жёІжҹ“
      const html = await marked.parse(body);
      const article = document.getElementById('post-content');
      article.innerHTML = `
        <header>
          <div class="post-date">${meta.date || ''}</div>
          <h1>${meta.title || slug}</h1>
          <div class="tags">${(meta.tags || '').split(',').filter(Boolean).map(t => `<span class="tag">${t.trim()}</span>`).join('')}</div>
        </header>
        ${html}
      `;
    } catch (e) {
      document.getElementById('post-content').innerHTML = `<p>еҠ иҪҪеӨұиҙҘпјҡ${e.message}</p>`;
    }
  })();
  </script>
</body>
</html>
