<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写文章 — ZM熵增</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="index.html" class="back-link">← 返回首页</a>

  <h1>✏️ 写文章</h1>

  <div class="editor-wrap">
    <!-- 元数据 -->
    <div class="editor-meta">
      <label>标题
        <input type="text" id="meta-title" placeholder="文章标题">
      </label>
      <label>文件名（英文）
        <input type="text" id="meta-slug" placeholder="hello-world">
      </label>
      <label>日期
        <input type="date" id="meta-date">
      </label>
      <label>标签（逗号分隔）
        <input type="text" id="meta-tags" placeholder="技术, 生活">
      </label>
      <label class="full-width">摘要（显示在首页）
        <input type="text" id="meta-excerpt" placeholder="一句话介绍这篇文章…">
      </label>
    </div>

    <!-- 编辑器 -->
    <div class="editor-toolbar">
      <button onclick="insertMarkdown('**', '**')" title="加粗">B</button>
      <button onclick="insertMarkdown('*', '*')" title="斜体"><em>I</em></button>
      <button onclick="insertMarkdown('~~', '~~')" title="删除线"><s>S</s></button>
      <button onclick="insertMarkdown('[', '](url)')" title="链接">🔗</button>
      <button onclick="insertMarkdown('![alt](', ')')" title="图片">🖼</button>
      <button onclick="insertLine('> ')" title="引用">"</button>
      <button onclick="insertLine('- ')" title="列表">•</button>
      <button onclick="insertLine('1. ')" title="有序列表">1.</button>
      <button onclick="insertMarkdown('`', '`')" title="行内代码">&lt;/&gt;</button>
      <button onclick="insertBlock('```\n', '\n```')" title="代码块">{ }</button>
      <button onclick="insertLine('---')" title="分割线">—</button>
    </div>

    <div class="editor-panes">
      <div class="editor-pane">
        <h3>Markdown</h3>
        <textarea id="editor" placeholder="在这里写 Markdown 正文…"></textarea>
      </div>
      <div class="editor-pane">
        <h3>预览</h3>
        <div class="preview-pane" id="preview"></div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="editor-actions">
      <button class="btn btn-primary" onclick="downloadMd()">⬇ 下载 .md 文件</button>
      <button class="btn" onclick="copyHtmlSnippet()">📋 复制首页 HTML</button>
      <span class="toast" id="toast"></span>
    </div>
  </div>

  <footer class="site-footer">
    <p>&copy; 2026 ZM熵增 · Powered by simplicity</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
  // 初始化日期为今天
  document.getElementById('meta-date').value = new Date().toISOString().split('T')[0];

  // 实时预览
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  editor.addEventListener('input', updatePreview);
  updatePreview();

  function updatePreview() {
    const html = marked.parse(editor.value || '');
    preview.innerHTML = html || '<p style="color:var(--text-lighter)">预览将显示在这里…</p>';
  }

  // 工具栏：插入包围标记
  function insertMarkdown(before, after) {
    const ta = editor;
    const s = ta.selectionStart, e = ta.selectionEnd;
    const sel = ta.value.substring(s, e);
    ta.value = ta.value.substring(0, s) + before + sel + after + ta.value.substring(e);
    ta.focus();
    ta.selectionStart = s + before.length;
    ta.selectionEnd = e + before.length;
    updatePreview();
  }

  // 工具栏：在行首插入
  function insertLine(prefix) {
    const ta = editor;
    const s = ta.selectionStart;
    const lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
    ta.value = ta.value.substring(0, lineStart) + prefix + ta.value.substring(lineStart);
    ta.focus();
    ta.selectionStart = lineStart + prefix.length;
    ta.selectionEnd = lineStart + prefix.length;
    updatePreview();
  }

  // 工具栏：插入代码块
  function insertBlock(before, after) {
    const ta = editor;
    const s = ta.selectionStart;
    ta.value = ta.value.substring(0, s) + before + after + ta.value.substring(ta.selectionEnd);
    ta.focus();
    ta.selectionStart = s + before.length;
    ta.selectionEnd = s + before.length;
    updatePreview();
  }

  // 构建 Markdown 内容
  function buildMd() {
    const title = document.getElementById('meta-title').value.trim();
    const date = document.getElementById('meta-date').value;
    const tags = document.getElementById('meta-tags').value.trim();
    const excerpt = document.getElementById('meta-excerpt').value.trim();
    const body = editor.value.trim();

    let frontmatter = '---\n';
    if (title) frontmatter += `title: ${title}\n`;
    if (date) frontmatter += `date: ${date}\n`;
    if (tags) frontmatter += `tags: ${tags}\n`;
    if (excerpt) frontmatter += `excerpt: ${excerpt}\n`;
    frontmatter += '---\n\n';

    return { full: frontmatter + body, title, date, tags, excerpt, body, slug: document.getElementById('meta-slug').value.trim() };
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // 下载 .md 文件
  function downloadMd() {
    const { full, slug } = buildMd();
    const filename = slug ? `${slug}.md` : 'article.md';
    const blob = new Blob([full], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
    toast(`✅ 已下载 ${filename}`);
  }

  // 复制首页 HTML 片段
  function copyHtmlSnippet() {
    const { title, date, tags, excerpt, slug } = buildMd();
    if (!slug) { toast('⚠️ 请先填写文件名'); return; }

    const tagSpans = tags.split(',').filter(Boolean).map(t => `<span class="tag">${t.trim()}</span>`).join('\n              ');
    const snippet = `      <li class="post-item">
            <div class="post-date">${date}</div>
            <h2 class="post-title"><a href="post.html?p=${slug}">${title}</a></h2>
            <p class="post-excerpt">${excerpt}</p>
            <div class="tags">
              ${tagSpans}
            </div>
          </li>`;

    navigator.clipboard.writeText(snippet).then(() => {
      toast('✅ 已复制，粘贴到 index.html 的 <ul class="post-list"> 中');
    }).catch(() => {
      toast('⚠️ 复制失败，请手动复制下方内容');
    });
  }
  </script>
</body>
</html>
